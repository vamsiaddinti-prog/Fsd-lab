<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .parent {
            display: grid;
            height: 700px;
            width: 1000px;
            background-color: grey;
            grid-template-columns: repeat(3, 100px);
            grid-template-rows: repeat(2, 100px);
            ;
            /* grid-gap: 30px; */

            /* align-items: start;
            justify-items: end; */

            grid-template-areas: "child1 child1 child1"
                "child2 child3 child3";

            align-content: end;
            justify-content: end;
        }

        .parent>div:nth-child(odd) {
            background-color: aqua;
        }

        .parent>div:nth-child(even) {
            background-color: orange;

        }

        .class1 {
            /* grid-column-start: 1;
            grid-column-end: 3; */
            /* grid-column: 1/3; */
            /* grid-row: 1/3; */

            grid-area: child1;
        }
    </style>
</head>

<body>
    <div class="parent">
        <div class="class1">class1 kkkkkkkkkkkkkkkkkkkkkkkkk</div>
        <div class="class2">class2</div>
        <div class="class3">class3</div>
        <div class="class4">class4</div>
        <!-- <div class="class5">class5</div> -->
    </div>

</body>

</html>
