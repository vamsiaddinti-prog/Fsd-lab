<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Java Scrpt Inputs</title>
</head>

<body>

    <form>
        <input type="text" id="name">
        <button onclick="getInput()">Submmit</button>
    </form>

    <h2 id="output"></h2>

    <script>

        let name = prompt("Enter your name by prompt()");
        alert(`Welcome ${name} by prompt()`);

        let result = confirm("Do you want to continue? by confirm()");
        if (result) {
            document.getElementById("output").innerText = "User selected ok";
        }
        else {
            document.getElementById("output").innerText = "User selected cancel";
        }

        function getInput() {
            let name = document.getElementById("name").value;
            alert(name);
        }




    </script>
</body>

</html>
