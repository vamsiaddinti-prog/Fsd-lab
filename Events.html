<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            gap: 10px;
        }
    </style>
</head>

<body>
    <div id="special">
        Name: <input id="sp" type="text">
        <button id="bt" onclick="change()"> Change background</button>
    </div>

    <script>

        function change() {
            var letters = "123456789ABCDEF";
            var color = "#";
            for (var i = 0; i < 6; i++) {
                var r = Math.floor(Math.random() * 16);
                color = color + letters[r]
            }
            document.body.style.backgroundColor = color;
        }



    </script>
</body>

</html>
