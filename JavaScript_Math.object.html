<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        //Math-->is a predifined object it has it's methods() and propertis

        console.log(Math.sign(8))  //+ve number then returns 1
        console.log(Math.sign(-3)) //-ve number then returns -1
        console.log(Math.sign(0))
        console.log(Math.sign('abc')) //returns Not A Number(NAN)

        console.log(Math.abs(-765))

        console.log(Math.sqrt(6))  //accepts only +ve values

        console.log(Math.pow(-3, 2))

        console.log(Math.min(3, 6, 5, 7))
        console.log(Math.max(34, 67, 89, 43))
        let a = [1, 2, 3, 4]
        console.log(Math.min(...a))  //... is spread operator it separates the array elements with commas without it we cant pass a full array 

        console.log(Math.round(5.756782))

        console.log(Math.ceil(6.1))
        console.log(Math.floor(6.9))

        console.log(Math.trunc(67.876)) //returns integer part

        console.log(Math.random()) // Randoms a random number between 0 to 1 note:no 0 and 1

        console.log(Math.exp(5)) //e^5

        console.log(Math.log(4))

        console.log(Math.log2(4))

        console.log(Math.log10(1000))




    </script>

</body>

</html>
