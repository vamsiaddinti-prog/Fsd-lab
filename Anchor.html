<!DOCTYPE html>

<head>
    <title>Anchor Tag</title>
</head>

<body>
    <h2>This is anchor page</h2>
    <h2>File in server</h2> <!-- External link,Absolute path-->
    <a href="https://www.amazon.in/" target="_blank">
        Amazon</a>

    <br>

    <a href="/Sub_Vega/sub_file.html" target="_blank">sub_file</a>

</body>

</html>
