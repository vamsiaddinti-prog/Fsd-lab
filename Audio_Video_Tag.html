<!DOCTYPE html>

<head>
    <title>Audio_tag&Video_tag</title>
</head>

<body>
    <h3>My Recorded Audio File</h3>
    <audio controls loop muted autoplay>
        <source src="Recording.m4a" type="audio/mp4">
    </audio>

    <h3>My Recorded Video File</h3>
    <video controls muted autoplay width="500" height="400">
        <source src="video.mp4" type="video/mp4">
    </video>
</body>

</html>
