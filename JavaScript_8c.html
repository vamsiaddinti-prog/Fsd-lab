<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
  
  document.write(`By using for-loop:<br>`)
        for (let i = 1; i <= 10; i++) {
            document.write(`${i} <br>`);

        }
 

    document.write(`By using while-loop:<br>`)      
        let j = 1;
        while (j <= 10) {
            document.write(`${j} <br>`);
            j++;
        }


       document.write(`By using do-while-loop:<br>`)  
        let k = 1;
        do {
            document.write(`${k} <br>`);
            k++;
        } while (k <= 10);
    </script>

</body>

</html>
