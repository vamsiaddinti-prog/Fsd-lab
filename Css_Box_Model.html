<html>

<head>
    <title>CSS Box Model</title>
    <style>
        .box {
            width: 300px;
            /* Content width */
            background-color: lightblue;
            /* Content area */
            padding: 30px;
            /* Space inside border */
            border: 10px double black;
            /* Border */
            margin: 40px;
            /* Space outside border */
        }
    </style>
</head>

<body>

    <div class="box">
        This is the Content area.
        Padding adds space inside.
        Border surrounds the padding.
        Margin creates space outside.
    </div>

</body>

</html>
