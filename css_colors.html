<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colors</title>
    <style>
        #first,
        #second,
        #third,
        #four,
        #five,
        #six {
            height: 150px;
            width: 150px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 10px;
        }

        #first {
            background-color: rgb(255, 150, 20);

        }

        #second {

            background-color: #FF19AB;
        }

        #third {

            background-color: hsl(68, 40%, 50%);
        }

        #four {

            background-color: rgba(255, 150, 20, 0.5);
        }

        #five {

            background-color: hsla(68, 40%, 50%, 0.5);
        }

        #six {

            background-color: pink;
        }
    </style>
</head>

<body>
    <div id="first">RGB Color Format</div>
    <div id="second">HexaDecimal Color Format</div>
    <div id="third">HSL Color Format</div>
    <div id="four">RGBA Color Format</div>
    <div id="five">HSLA Color Format</div>
    <div id="six">ColorName Format</div>

</body>

</html>
