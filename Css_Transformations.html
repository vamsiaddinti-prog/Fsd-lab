<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Font and Text Properties</title>
    <style>
        #one {
            margin-top: 100px;
            margin-left: 50px;
            height: 200px;
            width: 200px;
            background-color: aqua;
            transition: 3s;

            /* Required Font and Text Properties */
            font-size: 24px;
            /* font-size */
            font-weight: bold;
            /* font-weight */
            font-style: italic;
            /* font-style */
            text-decoration: underline;
            /* text-decoration */
            text-transform: uppercase;
            /* text-transformation */
            text-align: center;
            /* text-alignment */
            line-height: 200px;
            /* to center text vertically */
        }

        #one:hover {
            transform: scale(2);
            /* your transform property */
        }
    </style>
</head>

<body>
    <div id="one">Transform</div>
</body>

</html>
